name: baremetal-loop
runtime_model: main_loop_plus_isr
concurrency_model: interrupt_shared_state
resource_priority:
  - flash
  - ram
  - stack
  - isr_latency
search_priority:
  - hardware_truth
  - registers
  - entry_points
  - shared_state
guardrails:
  - no_heavy_abstraction
  - thin_isr
  - scan_handle_output
  - verify_hardware_before_change
  - prefer_direct_state
review_axes:
  - interrupt_safety
  - shared_state
  - timing_path
  - memory_budget
  - pin_mux_conflicts
notes_targets:
  - docs/HARDWARE-LOGIC.md
  - docs/DEBUG-NOTES.md
default_agents:
  - hw-scout
  - fw-doer
  - bug-hunter
default_quality_gate_skills:
  - scope-capture
default_quality_gate_signoffs:
  - board-bench
arch_review_triggers:
  - chip selection
  - device selection
  - solution preflight
  - PoC to production
  - pre-mortem
