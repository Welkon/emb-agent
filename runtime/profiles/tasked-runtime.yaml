name: tasked-runtime
runtime_model: task_scheduler_plus_isr
concurrency_model: tasks_queues_locks_timers
resource_priority:
  - responsiveness
  - stack
  - memory
  - reconnect_reliability
search_priority:
  - tasks
  - queues
  - mutexes
  - timers
  - connectivity_state
  - ota_path
guardrails:
  - verify_isr_to_task_boundaries
  - verify_priority_and_blocking
  - verify_offline_behavior
  - verify_upgrade_recovery
  - avoid_hidden_background_state
review_axes:
  - task_boundaries
  - deadlock_risk
  - priority_inversion
  - reconnect_strategy
  - local_cloud_consistency
  - ota_rollback
notes_targets:
  - docs/ARCH.md
  - docs/CONNECTIVITY.md
  - docs/RELEASE-NOTES.md
  - docs/DEBUG-NOTES.md
default_agents:
  - hw-scout
  - fw-doer
  - bug-hunter
  - sys-reviewer
  - release-checker
default_quality_gate_skills:
  - scope-capture
default_quality_gate_signoffs:
  - board-bench
arch_review_triggers:
  - architecture preflight
  - system preflight
  - selection review
  - prototype to production
  - architecture review
