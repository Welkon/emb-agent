name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Validate package contents
        run: npm pack --dry-run

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: emb-agent-rs-linux-x64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: emb-agent-rs-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: emb-agent-rs-macos-x64
            extra_targets: aarch64-apple-darwin
            extra_artifact: emb-agent-rs-macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: emb-agent-rs-windows-x64.exe

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}${{ matrix.extra_targets && format(',{0}', matrix.extra_targets) }}

      - name: Install cross-compilation linker (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build (release)
        run: cargo build -p emb-agent-rs --release --target ${{ matrix.target }}

      - name: Build extra target (release)
        if: matrix.extra_targets
        run: cargo build -p emb-agent-rs --release --target ${{ matrix.extra_targets }}

      - name: Rename artifact
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/emb-agent-rs.exe" "${{ matrix.artifact }}"
          else
            cp "target/${{ matrix.target }}/release/emb-agent-rs" "${{ matrix.artifact }}"
          fi
          if [[ -n "${{ matrix.extra_artifact }}" ]]; then
            cp "target/${{ matrix.extra_targets }}/release/emb-agent-rs" "${{ matrix.extra_artifact }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: matrix.extra_artifact
        with:
          name: ${{ matrix.extra_artifact }}
          path: ${{ matrix.extra_artifact }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: emb-agent-rs-*
          merge-multiple: true
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
