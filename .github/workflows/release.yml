name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            name: windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            name: macos-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - run: cp target/${{ matrix.target }}/release/emb-agent-rs${{ matrix.ext }} emb-agent-rs-${{ matrix.name }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: emb-agent-rs-${{ matrix.name }}
          path: emb-agent-rs-${{ matrix.name }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: emb-agent-rs-*
          path: artifacts

      - run: |
          mkdir release
          cp artifacts/*/* release/

      - uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: true
